query StaffQuery {
  tests_info_staff(where: {remove: {_eq: false, _is_null: true}}) {
    code
    kana
    name
    phone
    private_phone
    remove
    revision
    sex
    update_at
    update_user_history_id
    update_user_id
    remarks
  }
  tests_info_staff_aggregate(where: {remove: {_eq: false, _is_null: true}}) {
    aggregate {
      count
    }
  }
}

mutation StaffEdit {
  insert_tests_info_staff(objects: {code: "", kana: "", name: "", phone: "", private_phone: "", remarks: "", remove: false, sex: "", update_user_history_id: "", update_user_id: ""}) {
    returning {
      code
      kana
      name
      phone
      private_phone
      remarks
      remove
      sex
      update_at
      update_user_history_id
    }
  }
  update_tests_info_staff(_set: {kana: "", name: "", phone: "", private_phone: "", remarks: "", remove: false, sex: "", update_user_history_id: "", update_user_id: ""}) {
    returning {
      code
      kana
      name
      phone
      private_phone
      remarks
      remove
      sex
    }
  }
}
